<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信公众号封面次图模板 - 900×500</title>
    <style>
        :root {
            --feat-primary: #7c3aed;
            --feat-primary-light: #8b5cf6;
            --feat-primary-dark: #6d28d9;
            --feat-secondary: #64748b;
            --feat-accent: #f59e0b;
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-500: #737373;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            width: 900px;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--feat-primary) 0%, var(--feat-primary-dark) 100%);
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }
        
        .title {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 16px;
            max-width: 700px;
        }
        
        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            line-height: 1.6;
            max-width: 600px;
        }
        
        .features {
            display: flex;
            gap: 24px;
            margin-top: 30px;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 16px 20px;
            backdrop-filter: blur(10px);
        }
        
        .feature-value {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }
        
        .feature-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }
        
        .brand {
            position: absolute;
            bottom: 30px;
            right: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-logo {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .decoration {
            position: absolute;
            top: 0;
            right: 0;
            width: 350px;
            height: 100%;
            opacity: 0.1;
            background: 
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 40%);
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-overlay"></div>
        <div class="decoration"></div>
        
        <div class="tag">产品发布</div>
        
        <h1 class="title">Feat 2.0 正式发布</h1>
        
        <p class="subtitle">全新架构设计，性能提升 300%，带来更优雅的开发体验</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-value">300%</div>
                <div class="feature-label">性能提升</div>
            </div>
            <div class="feature">
                <div class="feature-value">50%</div>
                <div class="feature-label">代码精简</div>
            </div>
            <div class="feature">
                <div class="feature-value">10+</div>
                <div class="feature-label">新特性</div>
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-logo">F</div>
            <span class="brand-name">Feat</span>
        </div>
    </div>
</body>
</html>
