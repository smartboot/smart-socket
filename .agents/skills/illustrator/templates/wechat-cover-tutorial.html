<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术教程类文章封面模板 - 900×383</title>
    <style>
        :root {
            --feat-primary: #2563eb;
            --feat-primary-light: #3b82f6;
            --feat-primary-dark: #1d4ed8;
            --feat-secondary: #64748b;
            --feat-accent: #10b981;
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-500: #737373;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 
                -apple-system, 
                BlinkMacSystemFont, 
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue", 
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            width: 900px;
            height: 383px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--feat-primary) 0%, var(--feat-primary-dark) 100%);
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .difficulty {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .difficulty-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        
        .difficulty-dot.active {
            background: rgba(255, 255, 255, 0.9);
        }
        
        .difficulty-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 4px;
        }
        
        .title {
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 12px;
            max-width: 700px;
        }
        
        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            line-height: 1.5;
            max-width: 600px;
        }
        
        .steps {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            border-radius: 6px;
        }
        
        .step-number {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .step-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .brand {
            position: absolute;
            bottom: 30px;
            right: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-logo {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .decoration {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            opacity: 0.1;
            background: 
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 40%);
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-overlay"></div>
        <div class="decoration"></div>
        
        <div class="meta">
            <span class="tag">技术教程</span>
            <div class="difficulty">
                <div class="difficulty-dot active"></div>
                <div class="difficulty-dot active"></div>
                <div class="difficulty-dot"></div>
                <span class="difficulty-text">中级</span>
            </div>
        </div>
        
        <h1 class="title">手把手教你构建 RESTful API</h1>
        
        <p class="subtitle">从零开始，使用 Feat 框架快速搭建企业级 API 服务</p>
        
        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <span class="step-text">环境搭建</span>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <span class="step-text">路由设计</span>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <span class="step-text">数据验证</span>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <span class="step-text">部署上线</span>
            </div>
        </div>
        
        <div class="brand">
            <div class="brand-logo">F</div>
            <span class="brand-name">Feat</span>
        </div>
    </div>
</body>
</html>
